name: CI

on:
  push:
    branches: ["*"]
  pull_request:

# Default least-privilege scope. Each job below inherits this and can
# escalate explicitly if it ever needs to (e.g. release uploads).
permissions:
  contents: read

jobs:
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: web/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: web
        # `tsc -b` honra el `noEmit: true` de tsconfig.app.json — sólo
        # valida tipos sobre el grafo de referencias. Más rápido y
        # estricto que esperar a que se rompa `pnpm build`.
        run: pnpm typecheck

      - name: Lint
        working-directory: web
        run: pnpm lint

      - name: Run tests
        working-directory: web
        run: pnpm test

      - name: React Compiler healthcheck
        working-directory: web
        # Audita cada componente contra el React Compiler (la
        # optimización automática de React 19). El job FALLA si la
        # tasa de compatibilidad baja del 100 % — esto evita regresiones
        # silenciosas que harían que el compiler se "bail out" en
        # componentes nuevos. Ver web/eslint.config.js para la regla
        # lint correspondiente.
        run: |
          OUT=$(pnpm dlx react-compiler-healthcheck 2>&1)
          echo "$OUT"
          # Espera formato "Successfully compiled N out of N components."
          if echo "$OUT" | grep -qE "compiled ([0-9]+) out of \1 components"; then
            echo "All components compatible."
          else
            echo "Healthcheck reports incompatible components — bail out."
            exit 1
          fi

  knip:
    name: Dead code (knip)
    runs-on: ubuntu-latest
    # Hard gate desde la sesión 2026-05-21: tras #375 + #377 el repo
    # llegó a 0 unused files / deps / exports / types. Si un PR vuelve
    # a introducir dead code, el CI lo bloquea. Para suprimir un falso
    # positivo concreto, edita web/knip.config.ts.
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: web/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Run knip
        working-directory: web
        run: pnpm knip

  react-doctor:
    name: React Doctor (score)
    runs-on: ubuntu-latest
    # Visibility-only: el step compila un score numérico (0-100) del
    # codebase React y lo publica en el log + summary del run. Baseline
    # actual: 67/100 ("Needs work"). No bloquea hoy — la idea es ver
    # cómo evoluciona el score con cada PR y empezar a remediar las
    # categorías más numerosas (a11y, perf, correctness). Cuando
    # subamos a 75+ ("Great"), podemos elevar a hard gate añadiendo
    # `min-score: 75` y quitando continue-on-error.
    permissions:
      contents: read
      pull-requests: write # para que la action comente en la PR
    steps:
      - uses: actions/checkout@v4
        with:
          # Necesario para que `--diff main` calcule sólo los cambios de
          # la PR en runs de pull_request — el push a main usa el snapshot
          # completo igualmente.
          fetch-depth: 0

      - name: Run React Doctor
        uses: millionco/react-doctor@main
        continue-on-error: true
        with:
          # En pull_request: comenta inline en los hunks introducidos.
          # En push a main: sólo el score en el summary del run.
          diff: ${{ github.event_name == 'pull_request' && github.base_ref || '' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          retention-days: 1

  test-postgres:
    name: Test Backend (Postgres)
    runs-on: ubuntu-latest
    # Re-runs the full backend suite with HUBPLAY_TEST_DRIVER=postgres so
    # the same assertions are exercised against pgx + the postgres
    # migrations + queries-postgres + sqlc_pg generated bindings. Tests
    # that exercise sqlite-only raw SQL skip themselves via
    # testutil.SkipIfPostgres — that's documented per-test where used.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        # Wait for the server to accept connections before letting the
        # job proceed — otherwise the first test races the bootstrap and
        # the whole run flakes.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests against Postgres
        env:
          HUBPLAY_TEST_DRIVER: postgres
          HUBPLAY_TEST_POSTGRES_DSN: postgres://postgres:test@127.0.0.1:5432/postgres?sslmode=disable
        # Race detector left on — same coverage as the sqlite job. The
        # `internal/db` package is the bulk of the dual-dialect surface;
        # other packages exercise it transitively via testutil.
        run: go test -race -count=1 ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@v9
        with:
          # Pinned to avoid CI breaking on every upstream release. We're
          # on the v2 line because go.mod targets Go 1.25 and the last
          # v1 release (v1.64.8) is built with go 1.24, so it can't
          # analyse the module. Matching `.golangci.yml` uses the v2
          # schema. golangci-lint-action v7 is the first tag that
          # accepts v2 binaries; v6 hard-rejects them in parseVersion.
          version: v2.5.0

  vuln:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # govulncheck does call-graph analysis: it only fails the build
      # when a CVE actually reaches a code path we compile in, not
      # when a CVE merely lives in a transitive import. False-positive
      # rate is therefore very low and we can keep this gating.
      # Pulling from @latest is acceptable because the tool is an
      # official x/vuln binary signed by the Go team — the same trust
      # boundary as the toolchain itself.
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    # test-postgres is in the gate because every repo is dual-dialect:
    # a green sqlite run no longer implies the binary is releasable.
    # Same goes for the frontend lint+test combo.
    needs: [test, test-postgres, test-frontend, lint]
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags "-s -w" -o /dev/null ./cmd/hubplay
