name: CI

on:
  push:
    branches: ["*"]
  pull_request:

# Default least-privilege scope. Each job below inherits this and can
# escalate explicitly if it ever needs to (e.g. release uploads).
permissions:
  contents: read

# Opt into Node.js 24 for JavaScript-based actions. GitHub announced
# (2025-09-19) that Node 20 will stop being available on runners on
# 2026-09-16, with the default flipping to Node 24 in 2026-06-02.
# Setting this now silences the deprecation warnings AND surfaces any
# Node 24 incompat ahead of the forced switch — better to find a broken
# action in CI now than have it explode at the deadline.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: web/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Run tests
        working-directory: web
        run: pnpm test

  test:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@v8
        with:
          # v2.x is required to lint a module declaring `go 1.25` —
          # v1.64.8 was built with Go 1.24 and refuses to load. Pinned
          # to a specific patch so CI doesn't drift on each upstream
          # release. .golangci.yml uses the v2 schema (`version: "2"`,
          # `linters.settings`).
          version: v2.11.4

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, test-frontend, lint]
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags "-s -w" -o /dev/null ./cmd/hubplay
