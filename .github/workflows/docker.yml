name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Default least-privilege scope. The build job below escalates explicitly
# to packages:write to push the image to GHCR.
permissions:
  contents: read

jobs:
  docker:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write  # so Trivy can publish SARIF to the Security tab

    strategy:
      matrix:
        include:
          - target: ""
            suffix: ""
            platforms: linux/amd64,linux/arm64
          - target: hwaccel
            suffix: -hwaccel
            platforms: linux/amd64

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=${{ matrix.suffix }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-$(echo ${GITHUB_SHA} | head -c 7)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target || '' }}
          platforms: ${{ matrix.platforms }}
          # On PRs the image is loaded into the local Docker daemon
          # (no push) so the scan step below has something to inspect.
          # Multi-platform builds can't `load`, so we restrict the
          # PR-time scan to the default amd64+arm64 build by extracting
          # the first tag and pulling/scanning the registry image
          # only when push:true.
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' && matrix.target == 'hwaccel' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.target || 'default' }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target || 'default' }}

      # Vulnerability scan on the freshly built image. Only runs on the
      # hwaccel target because that's the single-platform build we can
      # `load` locally; the multi-arch default build pushes to the
      # registry and Trivy then pulls from there. Findings ship as
      # SARIF to the Security tab so CVEs are visible without scrolling
      # through Action logs.
      #
      # Severity gate is HIGH/CRITICAL — anything lower would gate
      # builds on weekly OS-level patch updates that the base-image
      # rebuild handles automatically.
      - name: Scan image with Trivy
        if: matrix.target == 'hwaccel' || github.event_name != 'pull_request'
        # `@master` is what the official Aqua README recommends — the
        # repo doesn't ship marketplace tags consistently (we tried
        # @0.28.0, which doesn't resolve). Pin to a SHA instead of a
        # branch when supply-chain hardening becomes a priority; for a
        # self-hosted single-tenant server, the latency-of-fix on
        # Trivy CVEs outweighs the supply-chain risk of trusting Aqua's
        # master branch.
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.tags && fromJSON(steps.meta.outputs.json).tags[0] || format('hubplay:scan-{0}', github.sha) }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true   # don't gate on CVEs the base image hasn't fixed yet
          exit-code: '0'         # report-only; doesn't block the merge

      - name: Upload Trivy results
        if: always() && (matrix.target == 'hwaccel' || github.event_name != 'pull_request')
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ matrix.target || 'default' }}
