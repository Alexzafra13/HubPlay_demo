# golangci-lint configuration (v2 schema).
#
# Migrated from v1 when go.mod moved to go 1.25.0 — golangci-lint v1.64.8
# (last v1 release) is built with go 1.24 and refuses to load modules
# targeting Go 1.25, so the v2 line is the only supported path now. The
# linter version is pinned in .github/workflows/ci.yml so this config
# has a known target.
version: "2"

linters:
  # Default v2 set already covers errcheck, govet, staticcheck,
  # ineffassign and unused — leaving them implicit is fine. We add
  # gosec on top because the default has zero security coverage, and
  # a self-hosted server that handles user uploads, FFmpeg args, file
  # paths and HTTP fetches has more security surface than the defaults
  # would flag.
  enable:
    - gosec

  settings:
    gosec:
      # CI gate runs at HIGH severity + HIGH confidence — that level is
      # currently clean across the codebase. Medium-severity findings
      # (subprocess launches, unbounded form parsing, integer overflow
      # in stat conversions, etc.) have been audited manually and are
      # either false positives (gosec can't see our path-validating
      # `pathmap` package, the sqlc allowlist on dynamic SortBy, or the
      # internally-built ffmpeg arg list) or known design choices we
      # don't want to break the build over. They're worth a periodic
      # manual sweep but shouldn't block PRs.
      #
      # Excluded rules:
      #   G104 — overlaps with errcheck (already on by default).
      #   G304 — file path tainted; pathmap + filepath.Clean make this
      #          a false positive on every call site.
      excludes:
        - G104
        - G304
      severity: high
      confidence: high

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$

issues:
  # Nothing to exclude project-wide today; if a generated file ever
  # shows up here, exclude with `exclusions.rules` rather than
  # disabling a linter outright.
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
