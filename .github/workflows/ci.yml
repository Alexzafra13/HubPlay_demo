name: CI

on:
  push:
    branches: [main]
  pull_request:

# Un solo run vivo por ref: un push nuevo a la misma PR cancela el run
# anterior (que ya no le importa a nadie). Antes, cada push a cualquier
# rama corría CI dos veces (push + pull_request) — B7 del audit.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default least-privilege scope. Each job below inherits this and can
# escalate explicitly if it ever needs to (e.g. release uploads).
permissions:
  contents: read

jobs:
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          package_json_file: web/package.json

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: web
        # `tsc -b` honra el `noEmit: true` de tsconfig.app.json — sólo
        # valida tipos sobre el grafo de referencias. Más rápido y
        # estricto que esperar a que se rompa `pnpm build`.
        run: pnpm typecheck

      - name: Lint
        working-directory: web
        run: pnpm lint

      - name: Run tests
        working-directory: web
        run: pnpm test

      - name: Production build
        working-directory: web
        # Vite/Rollup pueden romper sólo en build de producción
        # (chunking, import.meta, plugins) aunque typecheck + tests
        # pasen. Hasta ahora esto sólo se detectaba en release.yml —
        # demasiado tarde.
        run: pnpm build

      - name: React Compiler healthcheck
        working-directory: web
        # Audita cada componente contra el React Compiler (la
        # optimización automática de React 19). El job FALLA si la
        # tasa de compatibilidad baja del 100 % — esto evita regresiones
        # silenciosas que harían que el compiler se "bail out" en
        # componentes nuevos. Ver web/eslint.config.js para la regla
        # lint correspondiente.
        run: |
          OUT=$(pnpm dlx react-compiler-healthcheck 2>&1)
          echo "$OUT"
          # Espera formato "Successfully compiled N out of N components."
          if echo "$OUT" | grep -qE "compiled ([0-9]+) out of \1 components"; then
            echo "All components compatible."
          else
            echo "Healthcheck reports incompatible components — bail out."
            exit 1
          fi

  knip:
    name: Dead code (knip)
    runs-on: ubuntu-latest
    # Hard gate desde la sesión 2026-05-21: tras #375 + #377 el repo
    # llegó a 0 unused files / deps / exports / types. Si un PR vuelve
    # a introducir dead code, el CI lo bloquea. Para suprimir un falso
    # positivo concreto, edita web/knip.config.ts.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          package_json_file: web/package.json

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Run knip
        working-directory: web
        run: pnpm knip

  react-doctor:
    name: React Doctor (score)
    runs-on: ubuntu-latest
    # Visibility-only: el step compila un score numérico (0-100) del
    # codebase React y lo publica en el log + summary del run. Baseline
    # actual: 67/100 ("Needs work"). No bloquea hoy — la idea es ver
    # cómo evoluciona el score con cada PR y empezar a remediar las
    # categorías más numerosas (a11y, perf, correctness). Cuando
    # subamos a 75+ ("Great"), podemos elevar a hard gate añadiendo
    # `min-score: 75` y quitando continue-on-error.
    permissions:
      contents: read
      pull-requests: write # para que la action comente en la PR
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Necesario para que `--diff main` calcule sólo los cambios de
          # la PR en runs de pull_request — el push a main usa el snapshot
          # completo igualmente.
          fetch-depth: 0

      - name: Run React Doctor
        uses: millionco/react-doctor@a64093c8a14255dc2108d834d56f4d21b9d9ac60 # main 2026-06-10
        continue-on-error: true
        with:
          # En pull_request: comenta inline en los hunks introducidos.
          # En push a main: sólo el score en el summary del run.
          diff: ${{ github.event_name == 'pull_request' && github.base_ref || '' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage.out
          retention-days: 1

  test-postgres:
    name: Test Backend (Postgres)
    runs-on: ubuntu-latest
    # Re-runs the full backend suite with HUBPLAY_TEST_DRIVER=postgres so
    # the same assertions are exercised against pgx + the postgres
    # migrations + queries-postgres + sqlc_pg generated bindings. Tests
    # that exercise sqlite-only raw SQL skip themselves via
    # testutil.SkipIfPostgres — that's documented per-test where used.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        # Wait for the server to accept connections before letting the
        # job proceed — otherwise the first test races the bootstrap and
        # the whole run flakes.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run tests against Postgres
        env:
          HUBPLAY_TEST_DRIVER: postgres
          HUBPLAY_TEST_POSTGRES_DSN: postgres://postgres:test@127.0.0.1:5432/postgres?sslmode=disable
        # Race detector left on — same coverage as the sqlite job. The
        # `internal/db` package is the bulk of the dual-dialect surface;
        # other packages exercise it transitively via testutil.
        run: go test -race -count=1 ./...

  sqlc-verify:
    name: sqlc drift guard
    runs-on: ubuntu-latest
    # `make sqlc-verify` regenera el código sqlc con la versión pineada
    # del Makefile y falla si produce diff contra lo commiteado. Hasta
    # ahora el guard sólo corría si el dev se acordaba en local.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Verify sqlc-generated code is in sync
        env:
          # setup-go fija GOTOOLCHAIN=local; sqlc v1.31.1 exige go>=1.26
          # mientras go.mod va en 1.25 — auto deja que `go install`
          # descargue el toolchain que el módulo de sqlc declara.
          GOTOOLCHAIN: auto
        run: make sqlc-verify

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          # Pinned to avoid CI breaking on every upstream release. We're
          # on the v2 line because go.mod targets Go 1.25 and the last
          # v1 release (v1.64.8) is built with go 1.24, so it can't
          # analyse the module. Matching `.golangci.yml` uses the v2
          # schema. golangci-lint-action v7 is the first tag that
          # accepts v2 binaries; v6 hard-rejects them in parseVersion.
          version: v2.5.0

  vuln:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      # govulncheck does call-graph analysis: it only fails the build
      # when a CVE actually reaches a code path we compile in, not
      # when a CVE merely lives in a transitive import. False-positive
      # rate is therefore very low and we can keep this gating.
      # Pinned (no @latest): es un gate y queremos builds deterministas.
      # La DB de vulnerabilidades se consulta online en cada run, así
      # que pinear el binario NO congela los findings — sólo el tool.
      # Dependabot no cubre `go install`; bump manual periódico.
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: Run govulncheck
        run: govulncheck ./...

  e2e-smoke:
    name: E2E smoke (Playwright)
    runs-on: ubuntu-latest
    # Smoke de la cadena de playback REAL (gap de test nº 7 del audit
    # 2026-06-10): binario de producción (SPA embebida) + ffmpeg +
    # Chrome de verdad. Cubre play→seek→resume (DirectStream/HLS con
    # seek-restart), backend caído mid-play (error acotado, PB-16) y
    # UpNext entre episodios. Corre en paralelo al resto de jobs; si
    # demuestra ser estable unas semanas, promover a `build.needs`.
    #
    # Chrome: preinstalado en ubuntu-latest (los builds de Chromium de
    # Playwright son open-codecs-only y no decodifican H.264/AAC — ver
    # web/playwright.config.ts).
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          package_json_file: web/package.json

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install ffmpeg
        # El server bajo test lo necesita para probe + transcode, y el
        # global-setup para generar los fixtures de media sintéticos.
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build SPA
        working-directory: web
        run: pnpm build

      - name: Build server binary (embedded SPA)
        run: go build -o /tmp/hubplay-e2e ./cmd/hubplay

      - name: Run E2E smoke
        working-directory: web
        env:
          HUBPLAY_E2E_BIN: /tmp/hubplay-e2e
        run: pnpm test:e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            web/playwright-report
            web/test-results
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    # test-postgres is in the gate because every repo is dual-dialect:
    # a green sqlite run no longer implies the binary is releasable.
    # Same goes for the frontend lint+test combo.
    needs: [test, test-postgres, test-frontend, lint]
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags "-s -w" -o /dev/null ./cmd/hubplay
