# docker-compose.prod.yml — Production deployment for hubplay.duckdns.org
#
# Uso:
#   1. Ejecutar setup-server.sh primero (obtiene certificado SSL)
#   2. Ajustar rutas de /media abajo
#   3. docker compose -f docker-compose.prod.yml up -d

services:
  hubplay:
    build: ..
    container_name: hubplay
    ports:
      - "127.0.0.1:8096:8096"   # Solo localhost — nginx hace de proxy
    volumes:
      - hubplay-config:/config
      - hubplay-cache:/cache
      # === MEDIA: ajusta estas rutas a tu servidor ===
      - /media/movies:/media/movies:ro
      - /media/tv:/media/tv:ro
      # - /media/music:/media/music:ro
    environment:
      - TZ=Europe/Madrid
      - HUBPLAY_SERVER_BIND=0.0.0.0
      - HUBPLAY_SERVER_PORT=8096
      - HUBPLAY_SERVER_TRUSTED_PROXIES=127.0.0.1
      - HUBPLAY_LOGGING_LEVEL=info
      - HUBPLAY_LOGGING_FORMAT=json
      # Bundled Postgres DSN — the admin panel surfaces it as a
      # one-click toggle. SQLite remains the default until the
      # operator flips the switch explicitly.
      - HUBPLAY_POSTGRES_BUNDLED_DSN=postgres://hubplay:${HUBPLAY_POSTGRES_PASSWORD:-hubplay}@db:5432/hubplay?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8096/api/v1/health"]
      interval: 30s
      timeout: 3s
      start_period: 15s
      retries: 3
    # GPU transcoding (descomentar si tienes Intel iGPU)
    # devices:
    #   - /dev/dri:/dev/dri

  # Bundled Postgres — same rationale as docker-compose.yml. SQLite
  # is still the default; this exists so a one-click flip in the
  # admin UI works without provisioning an external DB.
  db:
    image: postgres:16-alpine
    container_name: hubplay-db
    environment:
      - POSTGRES_DB=hubplay
      - POSTGRES_USER=hubplay
      - POSTGRES_PASSWORD=${HUBPLAY_POSTGRES_PASSWORD:-hubplay}
    volumes:
      - hubplay-pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hubplay -d hubplay"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:alpine
    container_name: hubplay-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/hubplay.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount only the cert material we actually need. The full
      # /etc/letsencrypt tree contains private keys for every domain
      # certbot has ever issued on this host plus account credentials;
      # exposing it whole — even read-only — means a future nginx RCE
      # leaks every other domain's keys. The two paths below are the
      # only ones nginx reads to serve hubplay.
      - /etc/letsencrypt/live/hubplay.duckdns.org:/etc/letsencrypt/live/hubplay.duckdns.org:ro
      - /etc/letsencrypt/archive/hubplay.duckdns.org:/etc/letsencrypt/archive/hubplay.duckdns.org:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      hubplay:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  hubplay-config:
  hubplay-cache:
  hubplay-pgdata:
