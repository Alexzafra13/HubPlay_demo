name: CI

on:
  push:
    branches: ["*"]
  pull_request:

# Default least-privilege scope. Each job below inherits this and can
# escalate explicitly if it ever needs to (e.g. release uploads).
permissions:
  contents: read

jobs:
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: web/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Run tests
        working-directory: web
        run: pnpm test

  test:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@v7
        with:
          # Pinned to avoid CI breaking on every upstream release. We're
          # on the v2 line because go.mod targets Go 1.25 and the last
          # v1 release (v1.64.8) is built with go 1.24, so it can't
          # analyse the module. Matching `.golangci.yml` uses the v2
          # schema. golangci-lint-action v7 is the first tag that
          # accepts v2 binaries; v6 hard-rejects them in parseVersion.
          version: v2.5.0

  vuln:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # govulncheck does call-graph analysis: it only fails the build
      # when a CVE actually reaches a code path we compile in, not
      # when a CVE merely lives in a transitive import. False-positive
      # rate is therefore very low and we can keep this gating.
      # Pulling from @latest is acceptable because the tool is an
      # official x/vuln binary signed by the Go team — the same trust
      # boundary as the toolchain itself.
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, test-frontend, lint]
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags "-s -w" -o /dev/null ./cmd/hubplay
