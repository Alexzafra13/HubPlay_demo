# /etc/apache2/sites-available/hubplay.conf
# Apache 2.4 reverse proxy for HubPlay.
#
# Required modules (enable with `a2enmod`):
#   proxy proxy_http proxy_wstunnel ssl headers rewrite
#
# Activate with:
#   sudo a2ensite hubplay
#   sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName hubplay.example.com

    # Let's Encrypt challenge for cert renewal.
    Alias /.well-known/acme-challenge /var/www/certbot/.well-known/acme-challenge
    <Directory /var/www/certbot/.well-known/acme-challenge>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    # Everything else: redirect to HTTPS.
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^/?(.*)$ https://%{SERVER_NAME}/$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName hubplay.example.com

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/hubplay.example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/hubplay.example.com/privkey.pem
    SSLProtocol           -all +TLSv1.2 +TLSv1.3
    SSLCipherSuite        ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder   off
    SSLSessionTickets     off

    # Security headers — same set as nginx/Caddy/Traefik configs.
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
    Header always set X-Frame-Options            "SAMEORIGIN"
    Header always set X-Content-Type-Options     "nosniff"
    Header always set Referrer-Policy            "strict-origin-when-cross-origin"
    Header always set Vary                       "X-Hubplay-Client-Capabilities"

    ProxyPreserveHost On
    ProxyRequests     Off

    # WebSocket upgrade — must come BEFORE the generic ProxyPass directives
    # because RewriteRule with [P] matches by Upgrade header and would
    # otherwise be shadowed by a more general ProxyPass.
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/(api/v1/ws.*) "ws://127.0.0.1:8096/$1" [P,L]

    # Federation peer endpoints — no rate limit at proxy layer (peer JWTs
    # are the auth, app does per-peer token buckets), 24h timeout for
    # long-lived peer downloads, no body cap.
    <Location /api/v1/peer/>
        ProxyPass        http://127.0.0.1:8096/api/v1/peer/ flushpackets=on timeout=86400 connectiontimeout=10
        ProxyPassReverse http://127.0.0.1:8096/api/v1/peer/
        # Apache reads the entire request body before proxying by default;
        # for federation downloads (potentially multi-GB) we need streaming.
        SetEnv proxy-sendcl 0
        SetEnv proxy-sendchunked 1
    </Location>

    # SSE endpoints — flushpackets so events reach the client immediately.
    <LocationMatch "^/api/v1/(me/events|events|peer/events)$">
        ProxyPass        http://127.0.0.1:8096 flushpackets=on timeout=300
        ProxyPassReverse http://127.0.0.1:8096
    </LocationMatch>

    # Streaming endpoints — long timeout, no buffering.
    <Location /api/v1/stream/>
        ProxyPass        http://127.0.0.1:8096/api/v1/stream/ flushpackets=on timeout=3600
        ProxyPassReverse http://127.0.0.1:8096/api/v1/stream/
    </Location>

    # Catch-all for the SPA + API.
    ProxyPass        / http://127.0.0.1:8096/
    ProxyPassReverse / http://127.0.0.1:8096/

    # Apache's default request body limit is unlimited, but some hosts
    # set LimitRequestBody in apache2.conf. Override here for media
    # uploads (M3U files, etc.) and federation downloads.
    LimitRequestBody 0

    ErrorLog  ${APACHE_LOG_DIR}/hubplay-error.log
    CustomLog ${APACHE_LOG_DIR}/hubplay-access.log combined
</VirtualHost>
