name: Release

# Dispara la matriz de builds cross-platform + publica los artefactos en
# un GitHub Release. Triggers:
#   - push de un tag v* (e.g. v0.1.0 → release ESTABLE público, visible
#     en la pestaña "Releases" con su número de versión propio).
#   - push a main → actualiza una pre-release rolling "nightly". El tag
#     "nightly" se reescribe en cada build; el operador siempre tiene
#     el último binario descargable desde la página Releases sin que
#     tengamos que tagear.
#   - workflow_dispatch — igual que push a main: refresca "nightly".
#
# El binario de hubplay queda emparejado con ffmpeg + ffprobe del mismo
# release para que el operador descomprima y ejecute, sin instalar
# nada más. El binding lo hace cmd/hubplay/main.go al arrancar:
# prepende el directorio del ejecutable al PATH, así cualquier
# exec.LookPath("ffmpeg") los encuentra primero.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # publicar release + subir assets

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      # fail-fast off — si un target rompe (e.g. mirror de ffmpeg
      # down), el resto sigue para que el release no quede a medias.
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64, runner: ubuntu-latest,  ext: "",     archive: "tar.gz" }
          - { goos: linux,   goarch: arm64, runner: ubuntu-latest,  ext: "",     archive: "tar.gz" }
          - { goos: windows, goarch: amd64, runner: ubuntu-latest,  ext: ".exe", archive: "zip"    }
          - { goos: darwin,  goarch: amd64, runner: macos-latest,   ext: "",     archive: "tar.gz" }
          - { goos: darwin,  goarch: arm64, runner: macos-latest,   ext: "",     archive: "tar.gz" }
    steps:
      - uses: actions/checkout@v4
        # fetch-depth 0 → git describe necesita el historial completo
        # para resolver tags y la distancia hasta el último.
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: web/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Frontend build
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Compute version / commit / build date
        id: meta
        # Si el run viene de un tag, GITHUB_REF_NAME es el tag (v0.1.0).
        # Si es workflow_dispatch, usamos `git describe` para obtener el
        # nombre derivado del último tag. Mismo formato en ambos casos
        # — el binario muestra siempre algo identificable.
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            VERSION="$GITHUB_REF_NAME"
          else
            VERSION="$(git describe --tags --always --dirty)"
          fi
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "version=$VERSION"     >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT"       >> "$GITHUB_OUTPUT"
          echo "build_date=$BUILD_DATE" >> "$GITHUB_OUTPUT"

      - name: Go build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ steps.meta.outputs.version }}
          COMMIT: ${{ steps.meta.outputs.commit }}
          BUILD_DATE: ${{ steps.meta.outputs.build_date }}
        run: |
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags "-s -w \
              -X main.version=$VERSION \
              -X main.commit=$COMMIT \
              -X main.buildDate=$BUILD_DATE" \
            -o "dist/hubplay${{ matrix.ext }}" \
            ./cmd/hubplay

      - name: Bundle ffmpeg + ffprobe
        run: |
          ./scripts/fetch-ffmpeg.sh \
            "${{ matrix.goos }}" \
            "${{ matrix.goarch }}" \
            dist

      - name: Stage release files
        run: |
          # Estructura del archivo final:
          #   hubplay-<version>-<os>-<arch>/
          #     hubplay(.exe)
          #     ffmpeg(.exe)
          #     ffprobe(.exe)
          #     LICENSE
          #     LICENSE-ffmpeg.txt
          #     README.md (si existe)
          #     hubplay.example.yaml
          #
          # Las migraciones y el frontend ya van embebidos en el binario
          # (//go:embed en migrations.go), así que no los copiamos al
          # archivo — el operador sólo necesita el ejecutable + ffmpeg
          # + el yaml de ejemplo.
          VERSION="${{ steps.meta.outputs.version }}"
          NAME="hubplay-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "stage/$NAME"
          mv "dist/hubplay${{ matrix.ext }}"  "stage/$NAME/"
          mv "dist/ffmpeg${{ matrix.ext }}"   "stage/$NAME/"
          mv "dist/ffprobe${{ matrix.ext }}"  "stage/$NAME/"
          cp hubplay.example.yaml             "stage/$NAME/" 2>/dev/null || true
          [[ -f LICENSE ]] && cp LICENSE      "stage/$NAME/" || true
          [[ -f README.md ]] && cp README.md  "stage/$NAME/" || true
          # FFmpeg LGPL build notice — obligación legal de incluir el
          # disclaimer aunque no shippeemos sources (LGPL permite el
          # dynamic-link/separate-binary pattern que usamos).
          cat > "stage/$NAME/LICENSE-ffmpeg.txt" <<'EOF'
          This distribution includes FFmpeg (ffmpeg, ffprobe) compiled
          under LGPL terms by BtbN/FFmpeg-Builds (Linux/Windows) or
          evermeet.cx (macOS). FFmpeg is licensed under the GNU Lesser
          General Public License v2.1 or later. Source code and license
          terms: https://ffmpeg.org/legal.html
          EOF
          echo "NAME=$NAME" >> "$GITHUB_ENV"

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd stage
          tar -czf "../${NAME}.tar.gz" "$NAME"
          cd ..
          # sha256sum existe en ubuntu; macOS usa shasum -a 256.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
          else
            shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
          fi

      - name: Package (zip)
        if: matrix.archive == 'zip'
        run: |
          cd stage
          # zip viene preinstalado en runners ubuntu y macOS.
          zip -qr "../${NAME}.zip" "$NAME"
          cd ..
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${NAME}.zip" > "${NAME}.zip.sha256"
          else
            shasum -a 256 "${NAME}.zip" > "${NAME}.zip.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.NAME }}
          path: |
            ${{ env.NAME }}.tar.gz
            ${{ env.NAME }}.zip
            ${{ env.NAME }}.tar.gz.sha256
            ${{ env.NAME }}.zip.sha256
          if-no-files-found: ignore
          retention-days: 7

  # ─── Install script Linux (asset suelto del release) ───────────────
  # Sube scripts/install.sh y scripts/hubplay.service como assets del
  # release para que el operador pueda hacer:
  #
  #   curl -fsSL .../releases/latest/download/install.sh | sudo bash
  #
  # El script descarga el .tar.gz del binario que coincida con su
  # plataforma, lo extrae, crea usuario, registra systemd, arranca.
  linux-installer-assets:
    name: Stage Linux installer assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy install assets
        run: |
          mkdir -p dist
          cp scripts/install.sh       dist/install.sh
          cp scripts/hubplay.service  dist/hubplay.service
          chmod +x dist/install.sh
          sha256sum dist/install.sh       > dist/install.sh.sha256
          sha256sum dist/hubplay.service  > dist/hubplay.service.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hubplay-linux-installer-assets
          path: |
            dist/install.sh
            dist/hubplay.service
            dist/install.sh.sha256
            dist/hubplay.service.sha256
          retention-days: 7

  # ─── Installer Windows .exe (Inno Setup) ───────────────────────────
  # Toma el .zip del build de windows-amd64, le añade NSSM (BSD-licensed
  # service manager para que hubplay arranque sin consola al boot), y
  # compila scripts/installer.iss con ISCC.exe sobre runner Windows.
  #
  # El installer resultante (HubPlay-Setup-vX.Y.Z-windows-amd64.exe):
  #   - copia hubplay+ffmpeg+ffprobe a C:\Program Files\HubPlay
  #   - crea icono en Escritorio + Menú Inicio (apunta a localhost:8096)
  #   - opcionalmente registra HubPlay como servicio (vía NSSM) —
  #     arranca con el PC, sin consola visible
  #   - al final abre el navegador en localhost:8096 si el user lo marcó
  windows-installer:
    name: Build Windows installer
    needs: build
    runs-on: windows-latest
    # Sólo si el build de windows-amd64 tuvo éxito y produjo el zip.
    if: always() && !cancelled()
    steps:
      - uses: actions/checkout@v4
        # fetch-depth 0 → git describe necesita ver el tag "nightly"
        # para producir el mismo string de versión que el job build
        # (e.g. "nightly-7-g971ff38"). Sin esto degrada a sólo el SHA
        # y el nombre del zip no coincide.
        with:
          fetch-depth: 0

      - name: Download windows-amd64 archive
        uses: actions/download-artifact@v4
        with:
          pattern: hubplay-*-windows-amd64
          path: artifacts
          merge-multiple: true

      - name: Compute version
        id: meta
        shell: bash
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            VERSION="$GITHUB_REF_NAME"
          else
            VERSION="$(git describe --tags --always --dirty)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract zip + fetch NSSM
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          ZIP="artifacts/hubplay-${VERSION}-windows-amd64.zip"
          ls -la artifacts/
          unzip -q "$ZIP" -d stage
          # Estructura ahora: stage/hubplay-${VERSION}-windows-amd64/
          mv "stage/hubplay-${VERSION}-windows-amd64" "stage/source"

          # NSSM 2.24 — última release estable, BSD-licensed, redist OK.
          # nssm.cc da 503 con frecuencia (host pequeño). Intentamos
          # primero el origen oficial con --retry para flakes
          # transitorios; si insiste, fallback a un snapshot
          # estable de archive.org del mismo zip canonical.
          mkdir -p scripts/vendor
          if ! curl -fsSL --retry 5 --retry-delay 3 --retry-all-errors \
                 https://nssm.cc/release/nssm-2.24.zip -o nssm.zip; then
            echo "nssm.cc no responde, fallback a archive.org mirror..."
            curl -fsSL --retry 5 --retry-delay 3 --retry-all-errors \
              "https://web.archive.org/web/2024/https://nssm.cc/release/nssm-2.24.zip" \
              -o nssm.zip
          fi
          # Log del sha256 para auditar — si en runs sucesivas el hash
          # cambia significa que el host (nssm.cc o archive mirror) está
          # sirviendo algo distinto y el operador debe investigar.
          sha256sum nssm.zip || shasum -a 256 nssm.zip
          unzip -q nssm.zip
          cp nssm-2.24/win64/nssm.exe scripts/vendor/nssm.exe

      - name: Compile installer with Inno Setup
        # El .iss lee las vars vía GetEnv (las /D dan problemas de quoting).
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.8
        env:
          HUBPLAY_APP_VERSION: ${{ steps.meta.outputs.version }}
          HUBPLAY_SOURCE_DIR: ${{ github.workspace }}\stage\source
          HUBPLAY_OUTPUT_DIR: ${{ github.workspace }}\dist
        with:
          path: scripts/installer.iss

      - name: Hash the installer
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          cd dist
          ls -la
          # En windows-runner, sha256sum viene de git-bash.
          sha256sum "HubPlay-Setup-${VERSION}-windows-amd64.exe" \
            > "HubPlay-Setup-${VERSION}-windows-amd64.exe.sha256"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: hubplay-installer-windows-amd64
          path: |
            dist/HubPlay-Setup-*.exe
            dist/HubPlay-Setup-*.exe.sha256
          retention-days: 7

  # ─── Release estable (sólo tags v*) ────────────────────────────────
  release-tag:
    name: Publish stable release
    needs: [build, windows-installer, linux-installer-assets]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create stable GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.exe
            artifacts/install.sh
            artifacts/hubplay.service
            artifacts/*.sha256
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## Descarga rápida

            ### Linux server (recomendado)
            Un solo comando — descarga, instala como servicio systemd,
            crea usuario sistema, arranca. Probado en Ubuntu/Debian/Fedora/Arch
            y Raspberry Pi OS (amd64 + arm64).

            ```bash
            curl -fsSL https://github.com/Alexzafra13/HubPlay_demo/releases/latest/download/install.sh | sudo bash
            ```

            Para actualizar más adelante: vuelve a ejecutar el mismo comando —
            detecta versión instalada y hace upgrade in-place.

            ### Windows (recomendado)
            **`HubPlay-Setup-*-windows-amd64.exe`** — installer plug-and-play.
            Doble-click → siguiente → al terminar tienes icono en escritorio
            y HubPlay arrancando como servicio (sin consola visible). Abre
            el icono → se abre el navegador en la app.

            ### macOS
            Archivo `.tar.gz` con `hubplay` + `ffmpeg` + `ffprobe`. Descomprime,
            edita `hubplay.example.yaml`, lanza `./hubplay --config hubplay.yaml`.

            Una vez en la app, **el navegador te ofrece "Instalar HubPlay"**
            en la barra de direcciones — click → icono en escritorio, abre
            en ventana standalone como app nativa (PWA).

            ### NAS y plataformas no soportadas nativamente
            Synology, Unraid, QNAP, TrueNAS, Alpine: usa la **imagen Docker**.
            ```bash
            docker pull ghcr.io/alexzafra13/hubplay_demo:latest
            ```

            ### Avanzado (Windows .zip, Linux portable)
            Los `.zip`/`.tar.gz` traen los binarios sin registrar servicio.
            Útiles para correr manualmente, desde USB, o si tienes una
            estructura de servidor a medida.

            ### Plataformas

            - **Windows x64** — installer `.exe` o `.zip` portable
            - **Linux amd64** — `hubplay-*-linux-amd64.tar.gz`
            - **Linux arm64** — `hubplay-*-linux-arm64.tar.gz`
            - **macOS Intel** — `hubplay-*-darwin-amd64.tar.gz`
            - **macOS Apple Silicon** — `hubplay-*-darwin-arm64.tar.gz`

            Cada archivo tiene su `.sha256` adjunto para verificación.

            ### Aviso de SmartScreen en Windows
            El installer no está firmado todavía. Windows mostrará un aviso
            "SmartScreen protegió tu PC" — click en **"Más información" →
            "Ejecutar de todas formas"** la primera vez. Soluble en el
            futuro firmando con SignPath Foundation (gratis para OSS).

            ### Licencia

            HubPlay se distribuye bajo su licencia propia (`LICENSE`).
            Los binarios FFmpeg bundleados son LGPL — ver
            `LICENSE-ffmpeg.txt` dentro del archivo. NSSM (gestor del
            servicio Windows) es BSD — incluido sólo en el installer.

  # ─── Nightly rolling (push a main + workflow_dispatch) ─────────────
  # Mantiene un release público llamado "nightly" siempre actualizado
  # con el último build de main. Cada vez se borra el tag/release
  # anterior y se recrea con los binarios nuevos — el operador puede
  # descargar en cualquier momento sin esperar a que hagamos un tag
  # oficial.  Marcado como pre-release para que GitHub no lo muestre
  # como "latest" (eso queda reservado para los tags v*).
  release-nightly:
    name: Update nightly release
    needs: [build, windows-installer, linux-installer-assets]
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Delete previous nightly release + tag
        # gh CLI viene preinstalado en runners ubuntu. `|| true` para
        # que la primera run (cuando aún no existe el release) no falle.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true

      - name: Publish nightly pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly (último build de main)"
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.exe
            artifacts/install.sh
            artifacts/hubplay.service
            artifacts/*.sha256
          draft: false
          prerelease: true
          body: |
            > Build automático del último commit de `main` —
            > **no es un release estable**. Para producción usa una
            > versión taggeada (`v0.1.0`, etc.) cuando esté disponible.

            Commit: `${{ github.sha }}`
            Fecha:  build automático de la última run

            ## Descarga rápida

            **Linux server** — un comando, instala como servicio systemd:
            ```bash
            curl -fsSL https://github.com/Alexzafra13/HubPlay_demo/releases/download/nightly/install.sh | sudo bash
            ```

            **Windows** — usa `HubPlay-Setup-*-windows-amd64.exe` (installer
            plug-and-play: icono en escritorio + servicio sin consola).
            Si SmartScreen avisa, click en **"Más información" → "Ejecutar
            de todas formas"**.

            **macOS** — descomprime el `.tar.gz`, edita el yaml de
            ejemplo, lanza `./hubplay --config hubplay.yaml`. Luego en el
            navegador click en **"Instalar HubPlay"** para añadirlo como
            PWA con icono propio.

            ### Plataformas

            - **Windows x64** — installer `.exe` (recomendado) o `.zip` portable
            - **Linux amd64** — `hubplay-*-linux-amd64.tar.gz`
            - **Linux arm64** — `hubplay-*-linux-arm64.tar.gz`
            - **macOS Intel** — `hubplay-*-darwin-amd64.tar.gz`
            - **macOS Apple Silicon** — `hubplay-*-darwin-arm64.tar.gz`

            Cada archivo tiene su `.sha256` adjunto para verificación.
