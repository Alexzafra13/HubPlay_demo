server:
  bind: "0.0.0.0"
  port: 8096
  base_url: ""
  # trusted_proxies: CIDRs de proxies de confianza delante del server.
  # Decide cómo se extrae el IP del cliente para audit, rate limit y
  # logs. Lista vacía ⇒ usar IP de la conexión TCP (RemoteAddr), seguro
  # si el server está expuesto directo a internet. 1+ entradas ⇒ se
  # honra X-Forwarded-For saltando hops dentro de esos CIDRs; la
  # primera IP no-trusted es el cliente. Los defaults cubren docker
  # bridge (172.16/12) + localhost (nginx/traefik en la misma máquina).
  trusted_proxies:
    - "127.0.0.1/32"
    - "172.16.0.0/12"

database:
  # SQLite is the default — zero-config, file-per-install, perfect for
  # a single-host self-hosted deployment up to a few thousand items.
  driver: "sqlite"
  path: "./hubplay.db"

  # Postgres is supported as an alternative when you outgrow SQLite
  # (multi-GB libraries, multiple HubPlay instances against the same
  # data, or you already run a managed Postgres). Set driver to
  # "postgres" and provide a libpq-style DSN; `path` is then ignored.
  #
  # See docs/operations/postgres.md for the migration runbook
  # (pgloader for one-shot sqlite → postgres data move, plus the
  # operational notes on backup/restore which is handled differently).
  #
  # driver: "postgres"
  # dsn: "postgres://hubplay:password@localhost:5432/hubplay?sslmode=disable"

auth:
  jwt_secret: ""             # Auto-generated on first run
  bcrypt_cost: 12
  access_token_ttl: "15m"
  refresh_token_ttl: "720h"  # 30 days
  max_sessions_per_user: 10

logging:
  level: "info"
  format: "text"

rate_limit:
  enabled: true
  login_attempts: 5

observability:
  metrics_enabled: true
  metrics_path: "/metrics"
  # IMPORTANTE: /metrics filtra internals (sesiones, rutas, FDs, versión).
  # El bind por defecto es 0.0.0.0, así que en producción DEBES protegerlo:
  #  - define metrics_token (o HUBPLAY_OBSERVABILITY_METRICS_TOKEN) para
  #    exigir `Authorization: Bearer <token>` (o ?token=<token>), o
  #  - bloquea /metrics en tu reverse proxy.
  # Vacío = sin auth (la app avisa en el log al arrancar).
  metrics_token: ""

# Daily background sweep for append-only diagnostic tables. Without it
# the EPG and federation audit log grow forever — a long-lived install
# with IPTV + paired peers can hit multi-GB SQLite in weeks. Set any
# duration to 0 to disable that specific sweep.
retention:
  epg_programs: "24h"            # drop EPG rows whose end_time is older
  federation_audit_log: "720h"   # 30 days of cross-peer audit history
  sweep_interval: "24h"

# Media uploads (feature PR2). Subidas resumables via protocolo tus
# (POST/PATCH/HEAD/DELETE bajo /api/v1/uploads/). El pipeline post-bytes:
# magic-byte sniff → ffprobe → move atómico a librería → audit row.
# Permiso por usuario via can_upload + cuota per-user (PR1, columnas
# users.upload_quota_bytes / upload_used_bytes).
upload:
  enabled: true
  # Vacío = <config dir>/uploads/staging. Debe estar en el MISMO
  # filesystem que las librerías destino para que el move final sea
  # rename atómico — cross-fs cae a copy+remove, mismo resultado
  # pero más lento.
  staging_dir: ""
  max_bytes_per_upload: 53687091200  # 50 GiB. 0 = sin tope (no recomendado).
  min_duration_ms: 1000              # rechaza < 1s, defensa anti-payload trivial.

mdns:
  # Anuncia el servidor en la LAN como "<hostname>.local". Permite
  # acceder desde móviles/otros PCs sin saber la IP. Requiere UDP/5353
  # abierto entre el server y los clientes.
  enabled: true
  hostname: "hubplay"  # accederás en http://hubplay.local:8096
