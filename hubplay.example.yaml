server:
  bind: "0.0.0.0"
  port: 8096
  base_url: ""
  trusted_proxies:
    - "127.0.0.1"
    - "172.16.0.0/12"

database:
  driver: "sqlite"
  path: "./hubplay.db"

auth:
  jwt_secret: ""             # Auto-generated on first run
  bcrypt_cost: 12
  access_token_ttl: "15m"
  refresh_token_ttl: "720h"  # 30 days
  max_sessions_per_user: 10

logging:
  level: "info"
  format: "text"

rate_limit:
  enabled: true
  login_attempts: 5

observability:
  metrics_enabled: true
  metrics_path: "/metrics"

# Daily background sweep for append-only diagnostic tables. Without it
# the EPG and federation audit log grow forever — a long-lived install
# with IPTV + paired peers can hit multi-GB SQLite in weeks. Set any
# duration to 0 to disable that specific sweep.
retention:
  epg_programs: "24h"            # drop EPG rows whose end_time is older
  federation_audit_log: "720h"   # 30 days of cross-peer audit history
  sweep_interval: "24h"
