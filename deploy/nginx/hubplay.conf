# /etc/nginx/sites-available/hubplay
# Nginx reverse proxy for HubPlay media server
# Domain: hubplay.duckdns.org

upstream hubplay_backend {
    server 127.0.0.1:8096;
    keepalive 32;
}

# Self-hosted rate limits — pragmatic defaults for a family-sized user
# count. Numbers are deliberately generous: a single TV that mounts a
# Discover page can fire a dozen API calls in a second, so 10 r/s with
# burst=20 keeps that snappy while still putting a ceiling on a runaway
# script. Login is much tighter because a brute-force attempt is the
# only legitimate reason to hit it more than once a minute.
#
# The Go server has its own per-account login rate limiter (see
# internal/auth/service.go); the nginx zones below are an outer
# perimeter so a single bad actor on the WAN can't even reach those
# limits without first burning their nginx budget.
limit_req_zone $binary_remote_addr zone=hubplay_api:10m   rate=10r/s;
limit_req_zone $binary_remote_addr zone=hubplay_login:10m rate=5r/m;

# Compression. Streaming endpoints stay uncompressed (already encoded
# media segments — gzip would burn CPU for nothing) but everything
# else benefits, especially the SPA bundle and JSON list responses.
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_min_length 1024;
gzip_comp_level 5;
gzip_types
    application/json
    application/javascript
    application/manifest+json
    application/xml
    text/css
    text/javascript
    text/plain
    text/xml
    image/svg+xml;

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name hubplay.duckdns.org;

    # Let's Encrypt challenge (needed for certificate renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hubplay.duckdns.org;

    # SSL certificates (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/hubplay.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hubplay.duckdns.org/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Header buffer sizing — defence in depth for any endpoint that might
    # ever receive a long URL or header set. Live TV bulk schedule now
    # POSTs its payload so this isn't load-bearing; it stops a future
    # accidental GET of a big list from returning 414 on prod while the
    # same request works in dev.
    large_client_header_buffers 8 32k;

    # Login + refresh: tight per-IP rate limit. nodelay lets the burst
    # of 3 through immediately (a stale-cookie page can produce one
    # /auth/refresh + one /auth/login on retry within the same second);
    # anything beyond that is shaped down to 5 r/m which makes online
    # password brute-force impractical without losing legitimate users.
    location ~ ^/api/v1/auth/(login|refresh|setup)$ {
        limit_req zone=hubplay_login burst=3 nodelay;
        proxy_pass http://hubplay_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Streaming — no buffering, large timeouts for long playback. NO
    # rate limit here: HLS segments are emitted in clusters and tightly
    # back-to-back during playback. Limiting them would visibly stutter
    # the player.
    location /api/v1/stream/ {
        proxy_pass http://hubplay_backend;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket for real-time events
    location /api/v1/ws {
        proxy_pass http://hubplay_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # API and frontend. Generous burst (20) so a Discover page that
    # fans out a dozen queries in the same tick stays smooth, with the
    # 10 r/s zone smoothing sustained traffic.
    location / {
        limit_req zone=hubplay_api burst=20 nodelay;
        proxy_pass http://hubplay_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # No limit on media uploads
        client_max_body_size 0;
    }
}
