# golangci-lint v2 configuration.
#
# The default 60s timeout runs out on CI now that the module has grown
# past 100 files; bumping to 5m gives plenty of headroom without
# masking legitimately slow linters.
#
# Note: the linter version is pinned in .github/workflows/ci.yml
# (golangci-lint-action.version). v2 was required because go.mod
# declares `go 1.25` and v1.64.8 (the last v1.x) was built with Go
# 1.24, which makes it refuse to load the config.
version: "2"

run:
  timeout: 5m

# Linter selection. The default v2 set ("standard") already covers
# errcheck, govet, ineffassign, staticcheck (which absorbed gosimple),
# unused — leaving them implicit is fine. We add gosec on top because
# the standard set has zero security coverage, and a self-hosted
# server that handles user uploads, FFmpeg args, file paths, and HTTP
# fetches has more security surface than the default linters would
# flag.
linters:
  enable:
    - gosec

  settings:
    gosec:
      # CI gate runs at HIGH severity + HIGH confidence — that level is
      # currently clean across the codebase. Medium-severity findings
      # (subprocess launches, unbounded form parsing, integer overflow
      # in stat conversions, etc.) have been audited manually and are
      # either false positives (gosec can't see our path-validating
      # `pathmap` package, the sqlc allowlist on dynamic SortBy, or the
      # internally-built ffmpeg arg list) or known design choices we
      # don't want to break the build over. They're worth a periodic
      # manual sweep but shouldn't block PRs.
      #
      # Excluded rules:
      #   G104 — overlaps with errcheck (already on by default).
      #   G304 — file path tainted; pathmap + filepath.Clean make this
      #          a false positive on every call site.
      #   G703 — taint-analysis alias of G304; same false-positive
      #          profile (pathmap-validated paths gosec can't reason
      #          about). Excluded for the same reason.
      excludes:
        - G104
        - G304
        - G703
      severity: high
      confidence: high

    # Staticcheck QF* rules are quickfix style suggestions (apply De
    # Morgan's law, convert to tagged switch, etc.) — they're not
    # bugs, they're refactor hints from gopls. Useful in an editor;
    # not worth gating CI on. Re-enable on a per-rule basis if a
    # specific QF rule starts catching real issues.
    staticcheck:
      checks: ["all", "-QF*"]

    # v2 dropped the implicit v1 errcheck exclusions for deferred
    # Close() and fmt.Print* to writers. Listing the canonical cases
    # explicitly here makes the lint behavior deterministic — the
    # exclusion presets below cover most of these, but the explicit
    # list guards against future preset reshuffles.
    errcheck:
      exclude-functions:
        - (*os.File).Close
        - (io.Closer).Close
        - (io.ReadCloser).Close
        - (*database/sql.Rows).Close
        - (*database/sql.Stmt).Close
        - fmt.Print
        - fmt.Println
        - fmt.Printf
        - fmt.Fprint
        - fmt.Fprintln
        - fmt.Fprintf

  # The v1 "default exclusions" (text-matched patterns for deferred
  # Close/Flush, fmt.Print* to writers, etc.) used to be on by
  # default. v2 makes you opt in. These three presets together
  # restore the v1 baseline:
  #   - common-false-positives: deferred Close() noise
  #   - std-error-handling:     fmt.Print* / os.Setenv noise
  #   - legacy:                 misc v1 default text exclusions
  exclusions:
    presets:
      - common-false-positives
      - legacy
      - std-error-handling

# CI runs on PR + push; outside the linter we don't gate on style
# (golangci's defaults are strict enough). New rules added here should
# come with a clean repo run before being committed.
issues:
  # Nothing to exclude project-wide today; if a generated file ever
  # shows up here, exclude with `linters.exclusions.rules` rather than
  # disabling a linter outright.
  max-issues-per-linter: 0
  max-same-issues: 0
