version: "2"
sql:
  - engine: "sqlite"
    queries: "internal/db/queries/"
    schema: "migrations/sqlite/"
    gen:
      go:
        package: "sqlc"
        out: "internal/db/sqlc"
        emit_interface: true
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - column: "*.id"
            go_type: "string"
          - column: "*.created_at"
            go_type: "time.Time"
          - column: "*.updated_at"
            go_type: "time.Time"
