name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Default least-privilege scope. The build job below escalates explicitly
# to packages:write to push the image to GHCR.
permissions:
  contents: read

jobs:
  docker:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write  # so Trivy can publish SARIF to the Security tab

    strategy:
      matrix:
        include:
          - target: ""
            suffix: ""
            platforms: linux/amd64,linux/arm64
          - target: hwaccel
            suffix: -hwaccel
            platforms: linux/amd64

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=${{ matrix.suffix }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-$(echo ${GITHUB_SHA} | head -c 7)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          target: ${{ matrix.target || '' }}
          platforms: ${{ matrix.platforms }}
          # On PRs the image is loaded into the local Docker daemon
          # (no push) so the scan step below has something to inspect.
          # Multi-platform builds can't `load`, so we restrict the
          # PR-time scan to the default amd64+arm64 build by extracting
          # the first tag and pulling/scanning the registry image
          # only when push:true.
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' && matrix.target == 'hwaccel' }}
          # SBOM (SPDX) + SLSA provenance adjuntos a la imagen como
          # attestations OCI — consultables con `docker buildx imagetools
          # inspect`. Sólo cuando se pushea: `load` al daemon local (PRs)
          # no soporta attestations y el build fallaría.
          sbom: ${{ github.event_name != 'pull_request' }}
          provenance: ${{ github.event_name != 'pull_request' && 'mode=max' || 'false' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.target || 'default' }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target || 'default' }}

      # Vulnerability scan on the freshly built image. Only runs on the
      # hwaccel target because that's the single-platform build we can
      # `load` locally; the multi-arch default build pushes to the
      # registry and Trivy then pulls from there. Findings ship as
      # SARIF to the Security tab so CVEs are visible without scrolling
      # through Action logs.
      #
      # Severity gate is HIGH/CRITICAL — anything lower would gate
      # builds on weekly OS-level patch updates that the base-image
      # rebuild handles automatically.
      #
      # Gated on `success()` so a failed build (e.g. transient
      # proxy.golang.org GOAWAY on `go mod download`) doesn't drag the
      # scan into a "file does not exist" upload error — Trivy needs
      # an image to scan.
      - name: Scan image with Trivy
        if: success() && (matrix.target == 'hwaccel' || github.event_name != 'pull_request')
        # Pinned to a full commit SHA (v0.36.0) instead of `@master`.
        # We publish `:latest` to GHCR public, so a compromise of
        # trivy-action during a build would land in every user's
        # pulled image — supply-chain risk outweighs the latency cost
        # of a periodic bump. Renovate/dependabot can lift this pin.
        # Bump path: check https://github.com/aquasecurity/trivy-action/releases
        # for the next release tag, update both the SHA and the
        # trailing comment together.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.tags && fromJSON(steps.meta.outputs.json).tags[0] || format('hubplay:scan-{0}', github.sha) }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true   # don't gate on CVEs the base image hasn't fixed yet
          exit-code: '0'         # report-only; doesn't block the merge

      # Only attempt the SARIF upload when Trivy actually produced a
      # file. `hashFiles` returns "" when no path matches, so the
      # condition is false on builds where the scan was skipped or
      # failed. Without this, a failed build cascade into "Path does
      # not exist: trivy-results.sarif" and red the workflow twice.
      #
      # Bumped to v4 — v3 is scheduled for deprecation in Dec 2026.
      - name: Upload Trivy results
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ matrix.target || 'default' }}

      # Gate bloqueante SOLO en builds de tag (release estable): un
      # CRITICAL con fix disponible no debe publicarse bajo una versión
      # estable. Los pushes a main siguen siendo report-only (el scan
      # de arriba) para no bloquear el desarrollo con CVEs del día en
      # la imagen base. Nota: la imagen ya está pusheada al registry en
      # este punto — el gate rojo evita que el workflow quede verde y
      # avisa antes de promocionar/anunciar el release.
      - name: Trivy gate (CRITICAL blocks tagged releases)
        if: success() && startsWith(github.ref, 'refs/tags/v')
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.tags && fromJSON(steps.meta.outputs.json).tags[0] || format('hubplay:scan-{0}', github.sha) }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'
